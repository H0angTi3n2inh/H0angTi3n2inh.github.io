    <script>
        var audio = document.getElementById('bg-music');
        var playerContainer = document.querySelector('.music-player');
        var playPauseBtn = document.getElementById('play-pause-btn');
        var playIcon = document.getElementById('play-icon');
        var pauseIcon = document.getElementById('pause-icon');
        var volumeSlider = document.getElementById('volume-slider');
        
        var welcomeOverlay = document.getElementById('welcome-overlay');
        var entryBtn = document.getElementById('entry-btn');

        audio.volume = 0.3;

        function updatePlayerState() {
            if (audio.paused) {
                playerContainer.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                playerContainer.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
        }

        entryBtn.addEventListener('click', function() {
            welcomeOverlay.classList.add('hidden');
            audio.play().then(updatePlayerState).catch(function(e) {
                console.log("Không thể tự động phát nhạc: ", e);
            });
        });

        playPauseBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play().then(updatePlayerState);
            } else {
                audio.pause();
                updatePlayerState();
            }
        });

        volumeSlider.addEventListener('input', function(e) {
            e.stopPropagation();
            audio.volume = volumeSlider.value;
        });
    </script>
